networks:
  photobooth:
    driver: bridge
  proxy:
    external: true  # Traefik network (production)

services:
  api:
    build: ./apps/api
    container_name: pb-api
    volumes:
      - ./data:/data                           # Persistent: DB + photos
      - ./apps/api/src:/app/src                # Dev: live reload source code
      - ./packages/shared:/app/shared          # Dev: shared protocol
      - ./apps/api/presets/backgrounds:/data/backgrounds/presets  # Background presets
    networks:
      - photobooth
      - proxy                                  # Traefik network
    ports:
      - "8000:8000"                            # Local dev access
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/photobooth.db
      - PHOTOS_DIR=/data/photos
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - SMTP_HOST=${SMTP_HOST:-send.ahasend.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@mycreativity.nl}
      - API_URL=${API_URL:-http://localhost:8000}
      - ADMIN_URL=${ADMIN_URL:-http://localhost:3000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-steenweg@gmail.com}
    labels:
      # Traefik — API + WebSocket
      - "traefik.enable=true"
      - "traefik.http.routers.pb-api.rule=Host(`photobooth-api.mycreativity.nl`)"
      - "traefik.http.routers.pb-api.entrypoints=websecure"
      - "traefik.http.routers.pb-api.tls.certresolver=myresolver"
      - "traefik.http.services.pb-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy"
    restart: unless-stopped

  admin:
    build: ./apps/admin
    container_name: pb-admin
    volumes:
      - ./apps/admin/src:/app/src              # Dev: live reload source code
      - ./apps/admin/public:/app/public
    networks:
      - photobooth
      - proxy                                  # Traefik network
    ports:
      - "3000:3000"                            # Local dev access
    environment:
      - API_URL=http://api:8000                # Internal Docker network (S2S)
      - NEXT_PUBLIC_WS_URL=${WS_URL:-ws://localhost:8000}
    labels:
      # Traefik — Admin dashboard
      - "traefik.enable=true"
      - "traefik.http.routers.pb-admin.rule=Host(`photobooth-admin.mycreativity.nl`)"
      - "traefik.http.routers.pb-admin.entrypoints=websecure"
      - "traefik.http.routers.pb-admin.tls.certresolver=myresolver"
      - "traefik.http.services.pb-admin.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
    depends_on:
      - api
    restart: unless-stopped

  viewer:
    build: ./apps/viewer
    container_name: pb-viewer
    networks:
      - photobooth
      - proxy
    ports:
      - "3001:3000"
    environment:
      - API_URL=http://api:8000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pb-viewer.rule=Host(`photobooth.mycreativity.nl`)"
      - "traefik.http.routers.pb-viewer.entrypoints=websecure"
      - "traefik.http.routers.pb-viewer.tls.certresolver=myresolver"
      - "traefik.http.services.pb-viewer.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
    depends_on:
      - api
    restart: unless-stopped
