---
# ============================================================
# Photobooth — Full Pi Setup Playbook
# ============================================================
# Configures a fresh Raspberry Pi OS (Bookworm/Trixie 64-bit Lite)
# as a dedicated photobooth kiosk with silent boot.
#
# Usage:
#   cd apps/booth/ansible
#   ansible-playbook setup.yml
#
# What it does:
#   1. Disable unattended-upgrades (prevents apt lock conflicts)
#   2. Install system dependencies (SDL2, OpenCV, libgphoto2, etc.)
#   3. Sync app code via rsync
#   4. Create Python venv + install app
#   5. Configure fullscreen kiosk mode
#   6. Configure X11 autostart (autologin → startx → .xinitrc)
#   7. Configure silent boot + Plymouth splash
#   8. Enable camera interface
#
# The app starts via: autologin → .bash_profile → startx → .xinitrc
# NOT via systemd service (Kivy needs X11, not raw framebuffer).
# ============================================================

- name: Photobooth Pi Setup
  hosts: photobooth
  become: true

  vars:
    app_dir: /opt/photobooth
    venv_dir: /opt/photobooth/.venv
    # booth_user and booth_group come from inventory.ini
    # Path to this repo on your Mac (auto-detected)
    local_repo: "{{ playbook_dir }}/.."
    repo_root: "{{ playbook_dir }}/../../.."

  tasks:

    # ===========================================================
    # 0. PREVENT APT LOCK ISSUES
    # ===========================================================
    # Fresh Pi OS often runs unattended-upgrades on first boot.
    # This blocks our apt calls. Kill it and disable it.
    - name: Stop unattended-upgrades
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
      ignore_errors: true
      tags: [packages]

    - name: Disable unattended-upgrades
      ansible.builtin.systemd:
        name: unattended-upgrades
        enabled: false
      ignore_errors: true
      tags: [packages]

    - name: Wait for any running apt/dpkg to finish
      ansible.builtin.shell: |
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
          echo "Waiting for apt lock..."
          sleep 5
        done
        echo "Lock free"
      changed_when: false
      tags: [packages]

    - name: Fix any interrupted dpkg state
      ansible.builtin.command:
        cmd: dpkg --configure -a
      changed_when: false
      ignore_errors: true
      tags: [packages]

    # ===========================================================
    # 1. SYSTEM PACKAGES
    # ===========================================================
    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          # Python
          - python3
          - python3-venv
          - python3-pip
          - python3-dev
          - python3-setuptools        # Required by Ansible pip module
          - python3-pkg-resources      # Required by setuptools
          # SDL2 (Kivy backend)
          - libsdl2-dev
          - libsdl2-image-dev
          - libsdl2-mixer-dev
          - libsdl2-ttf-dev
          # GStreamer (video playback)
          - libgstreamer1.0-dev
          - gstreamer1.0-plugins-base
          - gstreamer1.0-plugins-good
          # Input
          - libmtdev-dev
          - libinput-dev
          # OpenGL
          - libgl1-mesa-dev
          - libgles2-mesa-dev
          # Image libraries
          - libjpeg-dev
          - libpng-dev
          - libtiff-dev
          # FFmpeg (video processing)
          - libavcodec-dev
          - libavformat-dev
          - libswscale-dev
          # OpenCV
          - libopencv-dev
          # DSLR support (gphoto2)
          - libgphoto2-dev
          # X11 (kiosk display)
          - xserver-xorg
          - x11-xserver-utils
          - xinit
          - unclutter
          # Tools
          - git
          - rsync
        state: present
        update_cache: true
        cache_valid_time: 3600
      tags: [packages]

    # ===========================================================
    # 2. APP DIRECTORY + CODE SYNC
    # ===========================================================
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ booth_user }}"
        group: "{{ booth_group }}"
        mode: "0755"

    - name: Sync app code to Pi
      ansible.builtin.synchronize:
        src: "{{ local_repo }}/"
        dest: "{{ app_dir }}/"
        delete: false
        rsync_opts:
          - "--exclude=.venv"
          - "--exclude=.git"
          - "--exclude=__pycache__"
          - "--exclude=.pytest_cache"
          - "--exclude=photos"
          - "--exclude=photobooth.db"
          - "--exclude=.kivy"
          - "--exclude=ansible"
      become: false
      tags: [deploy]

    - name: Sync shared package
      ansible.builtin.synchronize:
        src: "{{ repo_root }}/packages/shared/"
        dest: "{{ app_dir }}/shared/"
        delete: true
      become: false
      tags: [deploy]

    - name: Create photos directory
      ansible.builtin.file:
        path: "{{ app_dir }}/photos"
        state: directory
        owner: "{{ booth_user }}"
        group: "{{ booth_group }}"
        mode: "0755"

    # ===========================================================
    # 3. PYTHON VENV + INSTALL
    # ===========================================================
    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv {{ venv_dir }}
        creates: "{{ venv_dir }}/bin/python"
      become_user: "{{ booth_user }}"
      tags: [python]

    - name: Upgrade pip and setuptools
      ansible.builtin.pip:
        name:
          - pip
          - setuptools
          - wheel
        state: latest
        virtualenv: "{{ venv_dir }}"
      become_user: "{{ booth_user }}"
      tags: [python]

    # Ansible's pip module doesn't handle -e properly with modern pip.
    # Use command instead.
    - name: Install photobooth package (editable)
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install -e {{ app_dir }}"
      become_user: "{{ booth_user }}"
      register: pip_install
      changed_when: "'Successfully installed' in pip_install.stdout"
      tags: [python, deploy]

    - name: Install opencv-python-headless
      ansible.builtin.pip:
        name: opencv-python-headless
        virtualenv: "{{ venv_dir }}"
      become_user: "{{ booth_user }}"
      tags: [python]

    - name: Install gphoto2 (DSLR support)
      ansible.builtin.pip:
        name: gphoto2
        virtualenv: "{{ venv_dir }}"
      become_user: "{{ booth_user }}"
      tags: [python]

    # ===========================================================
    # 4. APP CONFIG (kiosk mode)
    # ===========================================================
    - name: Set fullscreen mode in booth.toml
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/booth.toml"
        regexp: '^fullscreen\s*='
        line: 'fullscreen = true'
      tags: [config]

    - name: Disable background video on Pi (GPU codec issues)
      ansible.builtin.lineinfile:
        path: "{{ app_dir }}/booth.toml"
        regexp: '^background_video\s*='
        line: 'background_video = ""'
      tags: [config]

    - name: Create Kivy config directory
      ansible.builtin.file:
        path: "/home/{{ booth_user }}/.kivy"
        state: directory
        owner: "{{ booth_user }}"
        group: "{{ booth_group }}"
        mode: "0755"
      tags: [config]

    - name: Generate correct Kivy config.ini
      ansible.builtin.shell: |
        # Run kivy once to generate default config, then fix it
        {{ venv_dir }}/bin/python -c "from kivy.config import Config; Config.write()" 2>/dev/null || true
        # Fix graphics settings for kiosk mode
        sed -i 's/^width = .*/width = 1024/' /home/{{ booth_user }}/.kivy/config.ini
        sed -i 's/^height = .*/height = 600/' /home/{{ booth_user }}/.kivy/config.ini
        sed -i 's/^position = .*/position = custom/' /home/{{ booth_user }}/.kivy/config.ini
        sed -i 's/^left = .*/left = 0/' /home/{{ booth_user }}/.kivy/config.ini
        sed -i 's/^top = .*/top = 0/' /home/{{ booth_user }}/.kivy/config.ini
        sed -i 's/^borderless = .*/borderless = 1/' /home/{{ booth_user }}/.kivy/config.ini
        sed -i 's/^resizable = .*/resizable = 0/' /home/{{ booth_user }}/.kivy/config.ini
        sed -i 's/^show_cursor = .*/show_cursor = 0/' /home/{{ booth_user }}/.kivy/config.ini
        # Remove probesysfs — it duplicates SDL2 touch input on kiosk
        python3 -c "
import configparser
c = configparser.RawConfigParser()
c.read('/home/{{ booth_user }}/.kivy/config.ini')
items = dict(c.items('input'))
c.remove_section('input')
c.add_section('input')
c.set('input', 'mouse', 'mouse')
with open('/home/{{ booth_user }}/.kivy/config.ini', 'w') as f:
    c.write(f)
"
      become_user: "{{ booth_user }}"
      changed_when: true
      tags: [config]

    # ===========================================================
    # 5. SUDOERS (allow service management without password)
    # ===========================================================
    - name: Allow booth user to manage service without password
      ansible.builtin.copy:
        content: |
          {{ booth_user }} ALL=(ALL) NOPASSWD: /bin/systemctl restart photobooth, /bin/systemctl stop photobooth, /bin/systemctl start photobooth
        dest: /etc/sudoers.d/photobooth
        mode: "0440"
        validate: "visudo -cf %s"
      tags: [service]

    # ===========================================================
    # 6. X11 KIOSK (autologin → startx → photobooth)
    # ===========================================================
    # The app starts via X11 kiosk, NOT systemd service.
    # Kivy requires an X11 display server — running directly on
    # the framebuffer causes pageflip errors on Pi.

    - name: Install .xinitrc for kiosk mode
      ansible.builtin.template:
        src: templates/xinitrc.j2
        dest: "/home/{{ booth_user }}/.xinitrc"
        owner: "{{ booth_user }}"
        group: "{{ booth_group }}"
        mode: "0755"
      tags: [kiosk]

    - name: Auto-start X on console login
      ansible.builtin.lineinfile:
        path: "/home/{{ booth_user }}/.bash_profile"
        line: '[[ -z $DISPLAY && $XDG_VTNR -eq 1 ]] && exec startx -- -nocursor 2>/dev/null'
        create: true
        owner: "{{ booth_user }}"
        group: "{{ booth_group }}"
        mode: "0644"
      tags: [kiosk]

    - name: Set auto-login to console
      ansible.builtin.command:
        cmd: raspi-config nonint do_boot_behaviour B2
      changed_when: true
      tags: [kiosk]

    # ===========================================================
    # 7. SILENT BOOT
    # ===========================================================
    - name: Find cmdline.txt
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /boot/firmware/cmdline.txt
        - /boot/cmdline.txt
      register: cmdline_check
      tags: [silent-boot, splash]

    - name: Set cmdline_path fact
      ansible.builtin.set_fact:
        cmdline_path: "{{ (cmdline_check.results | selectattr('stat.exists') | first).item }}"
      when: cmdline_check.results | selectattr('stat.exists') | list | length > 0
      tags: [silent-boot, splash]

    - name: Add silent boot kernel params
      ansible.builtin.lineinfile:
        path: "{{ cmdline_path }}"
        regexp: '^(.*)$'
        line: '\1 quiet splash loglevel=0 logo.nologo vt.global_cursor_default=0 consoleblank=0'
        backrefs: true
      when: cmdline_path is defined
      tags: [silent-boot]

    - name: Find config.txt
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /boot/firmware/config.txt
        - /boot/config.txt
      register: config_check
      tags: [silent-boot]

    - name: Set config_path fact
      ansible.builtin.set_fact:
        config_path: "{{ (config_check.results | selectattr('stat.exists') | first).item }}"
      when: config_check.results | selectattr('stat.exists') | list | length > 0
      tags: [silent-boot]

    - name: Disable rainbow splash
      ansible.builtin.lineinfile:
        path: "{{ config_path }}"
        regexp: '^#?disable_splash'
        line: 'disable_splash=1'
        create: false
      when: config_path is defined
      tags: [silent-boot]

    - name: Set GPU memory to 256MB
      ansible.builtin.lineinfile:
        path: "{{ config_path }}"
        regexp: '^#?gpu_mem'
        line: 'gpu_mem=256'
        create: false
      when: config_path is defined
      tags: [silent-boot]

    - name: Set boot delay to 0
      ansible.builtin.lineinfile:
        path: "{{ config_path }}"
        regexp: '^#?boot_delay'
        line: 'boot_delay=0'
        create: false
      when: config_path is defined
      tags: [silent-boot]

    - name: Suppress login messages
      ansible.builtin.file:
        path: "/home/{{ booth_user }}/.hushlogin"
        state: touch
        owner: "{{ booth_user }}"
        group: "{{ booth_group }}"
        mode: "0644"
      tags: [silent-boot]

    - name: Configure getty for silent autologin
      ansible.builtin.copy:
        content: |
          [Service]
          ExecStart=
          ExecStart=-/sbin/agetty --skip-login --noissue --noclear --autologin {{ booth_user }} %I $TERM
        dest: /etc/systemd/system/getty@tty1.service.d/override.conf
        mode: "0644"
      notify: Reload systemd
      tags: [silent-boot]

    - name: Suppress kernel messages on console
      ansible.posix.sysctl:
        name: kernel.printk
        value: "3 3 3 3"
        sysctl_set: true
        state: present
        reload: true
      tags: [silent-boot]

    # ===========================================================
    # 7b. PLYMOUTH BOOT SPLASH (logo during boot)
    # ===========================================================
    - name: Install Plymouth
      ansible.builtin.apt:
        name:
          - plymouth
          - plymouth-themes
        state: present
      tags: [splash]

    - name: Create Plymouth theme directory
      ansible.builtin.file:
        path: /usr/share/plymouth/themes/photobooth
        state: directory
        mode: "0755"
      tags: [splash]

    - name: Install Plymouth theme descriptor
      ansible.builtin.template:
        src: templates/plymouth-theme.j2
        dest: /usr/share/plymouth/themes/photobooth/photobooth.plymouth
        mode: "0644"
      tags: [splash]

    - name: Install Plymouth script
      ansible.builtin.template:
        src: templates/plymouth-script.j2
        dest: /usr/share/plymouth/themes/photobooth/photobooth.script
        mode: "0644"
      tags: [splash]

    - name: Copy boot logo
      ansible.builtin.copy:
        src: "{{ local_repo }}/assets/images/logo.png"
        dest: /usr/share/plymouth/themes/photobooth/logo.png
        mode: "0644"
      tags: [splash]

    - name: Copy boot background
      ansible.builtin.copy:
        src: "{{ local_repo }}/assets/images/splash-bg.png"
        dest: /usr/share/plymouth/themes/photobooth/bg.png
        mode: "0644"
      tags: [splash]

    - name: Set Photobooth as default Plymouth theme
      ansible.builtin.command:
        cmd: plymouth-set-default-theme photobooth
      changed_when: true
      tags: [splash]

    - name: Rebuild initramfs with Plymouth theme
      ansible.builtin.command:
        cmd: update-initramfs -u
      changed_when: true
      tags: [splash]

    - name: Add Plymouth params to kernel cmdline
      ansible.builtin.replace:
        path: "{{ cmdline_path }}"
        regexp: 'quiet splash'
        replace: 'quiet splash plymouth.ignore-serial-consoles'
      when: cmdline_path is defined
      tags: [splash]

    # ===========================================================
    # 8. HARDWARE
    # ===========================================================
    - name: Enable camera interface
      ansible.builtin.command:
        cmd: raspi-config nonint do_camera 0
      changed_when: true
      ignore_errors: true
      tags: [hardware]

  # =============================================================
  # HANDLERS
  # =============================================================
  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart photobooth
      ansible.builtin.systemd:
        name: photobooth
        state: restarted
