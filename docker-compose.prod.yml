# Production overrides — layered on top of docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    volumes: !override
      - ./data:/data                           # Persistent: DB + photos
    ports: !reset []

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile.prod
    volumes: !reset []
    ports: !reset []
    environment:
      - HOSTNAME=0.0.0.0
      - API_URL=http://api:8000
      - NEXT_PUBLIC_WS_URL=${WS_URL:-wss://photobooth-api.mycreativity.nl}

  viewer:
    build:
      context: ./apps/viewer
      dockerfile: Dockerfile.prod
    volumes: !reset []
    ports: !reset []
    environment:
      - HOSTNAME=0.0.0.0
      - API_URL=http://api:8000
