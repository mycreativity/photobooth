---
# ============================================================
# Photobooth — Quick Deploy Playbook
# ============================================================
# Syncs code and restarts the service. ~10 seconds.
#
# Usage:
#   cd ansible
#   ansible-playbook deploy.yml
# ============================================================

- name: Deploy photobooth
  hosts: photobooth
  become: true

  vars:
    app_dir: /opt/photobooth
    venv_dir: /opt/photobooth/.venv
    booth_user: pi
    booth_group: pi
    local_repo: "{{ playbook_dir }}/.."

  tasks:
    - name: Sync app code
      ansible.builtin.synchronize:
        src: "{{ local_repo }}/"
        dest: "{{ app_dir }}/"
        delete: false
        rsync_opts:
          - "--exclude=.venv"
          - "--exclude=.git"
          - "--exclude=__pycache__"
          - "--exclude=.pytest_cache"
          - "--exclude=photos"
          - "--exclude=photobooth.db"
          - "--exclude=.kivy"
          - "--exclude=ansible"
      become: false

    - name: Reinstall package (pick up new deps)
      ansible.builtin.pip:
        name: "-e {{ app_dir }}"
        virtualenv: "{{ venv_dir }}"
      become_user: "{{ booth_user }}"

    - name: Restart photobooth service
      ansible.builtin.systemd:
        name: photobooth
        state: restarted
