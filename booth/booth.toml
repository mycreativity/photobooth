# Photobooth Configuration
# ========================
# Copy this file and adjust settings for your booth setup.

[app]
name = "Photobooth"
event_name = ""                 # e.g. "Wedding Jan & Lisa" — groups all sessions
fullscreen = false          # Set to true for kiosk mode on Pi
width = 1280
height = 800
fps = 30
language = "nl"             # "nl" (Nederlands) or "en" (English)
theme = "classic"           # See src/photobooth/ui/themes.py for options
background_video = "assets/videos/photobooth-bg-vid.mp4"

[camera]
backend = "webcam"          # "webcam", "stub" (dev), or "gphoto2" (DSLR)
device_index = 0            # Webcam device index (0 = first camera)
preview_fps = 15
capture_format = "jpeg"
capture_quality = 95

[countdown]
first_countdown = 5         # Seconds before the first photo
between_shots = 3           # "Panic gap" between subsequent photos
sound_enabled = true

[processing]
max_workers = 2             # ProcessPoolExecutor workers for filters
output_dir = "photos"
thumbnail_size = [320, 240]

[printing]
enabled = false
printer_name = ""           # Empty = system default
copies = 1

[storage]
database = "photobooth.db"
photo_dir = "photos"

[email]
enabled = false
smtp_host = "smtp.gmail.com"
smtp_port = 587
smtp_user = ""                  # e.g. "photobooth@gmail.com"
smtp_password = ""              # App-specific password
from_address = ""               # Defaults to smtp_user if empty
subject = "Your Photobooth Photos!"

[led]
enabled = false                 # Set to true on Pi with LED strip
led_count = 80                  # Number of LEDs in the strip
gpio_pin = 18                   # GPIO pin (18 = PWM0)
brightness = 80                 # 0-255 default brightness
flash_brightness = 255          # Max brightness for photo flash

[server]
enabled = false                         # Enable admin server connection
url = "ws://192.168.0.128:8000"         # Server WS URL (LAN IP for dev)
booth_id = "booth-001"                  # Unique booth identifier
booth_name = "Photobooth 1"             # Human-readable name
api_key = ""                            # Pre-shared API key (optional)
heartbeat_interval = 10                 # Seconds between heartbeats
reconnect_delay = 5                     # Initial reconnect delay (seconds)
reconnect_max_delay = 60                # Max reconnect delay (exponential backoff)
