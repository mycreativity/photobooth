# Local development overrides
# Automatically used by: docker compose up
# Disables Traefik and uses dev mode for fast hot reload.

networks:
  proxy:
    external: false  # Create locally (no Traefik needed)

services:
  server:
    labels: []

  admin:
    labels: []
    volumes:
      - ./admin/src:/app/src             # Hot reload source
      - ./admin/public:/app/public
      - /app/node_modules                # Don't override node_modules
      - /app/.next                       # Don't override .next
